<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="tt desc">
  <title id="tt">Vision-EviDex</title>
  <desc id="desc">Camera aperture iris with shield mark and horizontal scan line on deep navy field.</desc>
  <defs>
    <radialGradient id="bgNavy" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0E3D7A"/>
      <stop offset="100%" stop-color="#051D3D"/>
    </radialGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60CDFF"/>
      <stop offset="100%" stop-color="#0099BC"/>
    </radialGradient>
    <linearGradient id="scan" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#60CDFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60CDFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60CDFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60CDFF"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <filter id="bladeHi" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Rounded-square backing (22.5% radius = 230.4) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bgNavy)"/>
  <!-- Aperture iris: 6 blades rotated at 60° intervals, each a curved quadrilateral.
       Single reference blade is drawn at 12 o'clock, then rotated 5× around (512,512). -->
  <g transform="translate(512 512)">
    <g id="ap">
      <!-- Blade: leaf-shape from origin, rotated into place by rotate() on <use> -->
      <path id="blade"
        d="M0 -320 C 90 -300 155 -210 155 -110 C 155 -30 90 20 0 20 C -70 -30 -120 -90 -120 -180 C -120 -250 -70 -300 0 -320 Z"
        fill="url(#bladeGrad)"/>
      <!-- Inner highlight on leading edge (top-left of each blade) -->
      <path id="bladeEdge"
        d="M0 -320 C -50 -310 -95 -290 -120 -180"
        stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <use href="#ap" transform="rotate(0)"/>
    <use href="#ap" transform="rotate(60)"/>
    <use href="#ap" transform="rotate(120)"/>
    <use href="#ap" transform="rotate(180)"/>
    <use href="#ap" transform="rotate(240)"/>
    <use href="#ap" transform="rotate(300)"/>
    <!-- Central aperture opening (28% diameter = ~143px radius). -->
    <circle cx="0" cy="0" r="143" fill="url(#lensGlow)"/>
  </g>
  <!-- Scan line across aperture width (1024*0.6 ≈ 614 wide, centred) -->
  <rect x="204" y="510" width="614" height="4" fill="url(#scan)"/>
  <!-- Shield, bottom-right, 22% canvas ≈ 225px -->
  <g transform="translate(712 712)">
    <path
      d="M 0 -110 L 100 -80 L 100 30 C 100 80 50 110 0 125 C -50 110 -100 80 -100 30 L -100 -80 Z"
      fill="none" stroke="url(#shieldStroke)" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
