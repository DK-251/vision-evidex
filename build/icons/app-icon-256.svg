<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="256" height="256" role="img" aria-labelledby="tt desc">
  <title id="tt">Vision-EviDex (256)</title>
  <desc id="desc">Camera aperture iris with verified shield mark — mid-size app icon.</desc>
  <defs>
    <radialGradient id="bgNavy" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0E3D7A"/><stop offset="100%" stop-color="#051D3D"/></radialGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0078D4"/><stop offset="100%" stop-color="#00B4D8"/></linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#60CDFF"/><stop offset="100%" stop-color="#0099BC"/></radialGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60CDFF"/><stop offset="100%" stop-color="#0078D4"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bgNavy)"/>
  <g transform="translate(512 512)">
    <g id="ap">
      <path d="M0 -320 C 90 -300 155 -210 155 -110 C 155 -30 90 20 0 20 C -70 -30 -120 -90 -120 -180 C -120 -250 -70 -300 0 -320 Z" fill="url(#bladeGrad)"/>
      <path d="M0 -320 C -50 -310 -95 -290 -120 -180" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <use href="#ap" transform="rotate(60)"/><use href="#ap" transform="rotate(120)"/><use href="#ap" transform="rotate(180)"/><use href="#ap" transform="rotate(240)"/><use href="#ap" transform="rotate(300)"/>
    <circle r="143" fill="url(#lensGlow)"/>
  </g>
  <!-- Shield with verification checkmark -->
  <g transform="translate(712 712)">
    <path d="M 0 -110 L 100 -80 L 100 30 C 100 80 50 110 0 125 C -50 110 -100 80 -100 30 L -100 -80 Z" fill="none" stroke="url(#shieldStroke)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M -45 0 L -10 35 L 50 -35" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
