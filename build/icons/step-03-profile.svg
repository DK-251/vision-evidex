<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Profile</title>
  <desc id="desc">Verified user silhouette — profile step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <circle cx="16" cy="11" r="5" fill="url(#g)"/>
  <!-- Body arc (shoulders) -->
  <path d="M 6 27 C 6 20 10 17 16 17 C 22 17 26 20 26 27"
        fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Verified badge, bottom-right of head -->
  <circle cx="21.5" cy="14.5" r="4" fill="url(#g)" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M 19.8 14.5 L 21 15.7 L 23.2 13.3"
        fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
