<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Organisation &amp; branding</title>
  <desc id="desc">Building skyline with colour palette — branding step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Three building blocks (skyline) -->
  <g stroke="url(#g)" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <rect x="5"  y="12" width="6" height="14" rx="1"/>
    <rect x="13" y="7"  width="6" height="19" rx="1"/>
    <rect x="21" y="14" width="6" height="12" rx="1"/>
  </g>
  <!-- Palette / brush, bottom-right -->
  <g transform="translate(24 22)">
    <circle r="4" fill="url(#g)"/>
    <circle r="1" cx="-1.5" cy="-1" fill="#FFFFFF" opacity="0.9"/>
    <circle r="1" cx="1.5"  cy="-1" fill="#FFFFFF" opacity="0.7"/>
    <circle r="1" cx="0"    cy="1.5" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
