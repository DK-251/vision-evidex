<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Default template</title>
  <desc id="desc">Report template with starred layout grid — template step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Document outline -->
  <rect x="5" y="4" width="22" height="24" rx="2"
        fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Header block -->
  <rect x="7" y="6" width="18" height="5" rx="1" fill="url(#g)"/>
  <!-- Two column rectangles -->
  <rect x="7"  y="13" width="8" height="13" rx="1" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <rect x="17" y="13" width="8" height="13" rx="1" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Star badge top-right -->
  <g transform="translate(26 6)">
    <path d="M 0 -3 L 0.9 -1 L 3 -0.7 L 1.4 0.8 L 1.9 3 L 0 1.8 L -1.9 3 L -1.4 0.8 L -3 -0.7 L -0.9 -1 Z"
          fill="url(#g)" stroke="url(#g)" stroke-width="0.5" stroke-linejoin="round"/>
  </g>
</svg>
