<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Hotkeys</title>
  <desc id="desc">Keyboard with lightning bolt — hotkey configuration step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Keyboard body -->
  <rect x="3" y="9" width="26" height="17" rx="2.5"
        fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Key dots: 3 / 4 / 3 layout -->
  <g fill="none" stroke="url(#g)" stroke-width="1.3">
    <circle cx="8"  cy="14" r="1"/>
    <circle cx="14" cy="14" r="1"/>
    <circle cx="20" cy="14" r="1"/>
    <circle cx="7"  cy="18" r="1"/>
    <circle cx="11" cy="18" r="1"/>
    <circle cx="15" cy="18" r="1"/>
    <circle cx="19" cy="18" r="1"/>
    <circle cx="8"  cy="22" r="1"/>
    <circle cx="14" cy="22" r="1"/>
    <circle cx="20" cy="22" r="1"/>
  </g>
  <!-- Lightning bolt overlay on right half -->
  <path d="M 26 6 L 21 16 L 25 16 L 22 27 L 29 14 L 25 14 Z"
        fill="url(#g)" stroke="url(#g)" stroke-width="1" stroke-linejoin="round"/>
</svg>
