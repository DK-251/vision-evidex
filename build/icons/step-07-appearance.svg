<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Appearance</title>
  <desc id="desc">Half-moon / half-sun split — light / dark theme step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <clipPath id="leftHalf"><rect x="0" y="0" width="16" height="32"/></clipPath>
    <clipPath id="rightHalf"><rect x="16" y="0" width="16" height="32"/></clipPath>
  </defs>
  <!-- Left half: crescent moon -->
  <g clip-path="url(#leftHalf)">
    <circle cx="16" cy="16" r="10" fill="url(#g)"/>
    <circle cx="19" cy="14" r="9" fill="var(--moon-bg, #FFFFFF)"/>
  </g>
  <!-- Right half: sun with radiating lines -->
  <g clip-path="url(#rightHalf)" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" fill="none">
    <circle cx="16" cy="16" r="5" fill="url(#g)"/>
    <path d="M 16 5 V 8"/>
    <path d="M 16 24 V 27"/>
    <path d="M 27 16 H 24"/>
    <path d="M 23.8 8.2 L 21.7 10.3"/>
    <path d="M 23.8 23.8 L 21.7 21.7"/>
  </g>
  <!-- Centre divider -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="url(#g)" stroke-width="1" stroke-linecap="round"/>
  <style>
    :root[data-theme='dark'] svg { --moon-bg: #1E1E1E; }
    @media (prefers-color-scheme: dark) { svg { --moon-bg: #1E1E1E; } }
  </style>
</svg>
