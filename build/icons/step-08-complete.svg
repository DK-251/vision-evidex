<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="tt desc">
  <title id="tt">Complete</title>
  <desc id="desc">Circle check with achievement burst — all set step icon.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="tick" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#6B2FBA"/>
    </linearGradient>
  </defs>
  <!-- Circle ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Filled checkmark shape -->
  <path d="M 11 16.5 L 14.4 19.7 L 21 13 L 22.2 14.3 L 14.5 22 L 9.8 17.7 Z"
        fill="url(#tick)" stroke="url(#tick)" stroke-width="0.4" stroke-linejoin="round"/>
  <!-- Achievement burst at 45° -->
  <g stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <path d="M 25 7  L 27.8 4.2"/>
    <path d="M 7  7  L 4.2 4.2"/>
    <path d="M 25 25 L 27.8 27.8"/>
    <path d="M 7  25 L 4.2 27.8"/>
  </g>
</svg>
